<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WDYS!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FDF6EC;
    --cream2: #F5E9D6;
    --cream3: #EDD9B8;
    --crimson: #9B1C1C;
    --crimson2: #C0392B;
    --crimson3: #E74C3C;
    --gold: #C8960C;
    --ink: #2C1010;
    --ink2: #5A2020;
    --ink3: #8B4444;
    --shadow: rgba(155,28,28,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Bebas Neue', Impact, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 60px;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(155,28,28,0.07) 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239B1C1C' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  @keyframes pop {
    0% { transform: scale(0.85) rotate(-1deg); opacity: 0; }
    70% { transform: scale(1.03) rotate(0.5deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px) rotate(-0.5deg); }
    75% { transform: translateX(4px) rotate(0.5deg); }
  }
  @keyframes glowRing {
    0%,100% { box-shadow: 0 0 0 3px var(--crimson2), 0 0 18px var(--shadow); }
    50% { box-shadow: 0 0 0 3px var(--crimson3), 0 0 32px rgba(192,57,43,0.35); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes dots {
    0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }
  @keyframes scanPulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  #app {
    width: 100%;
    max-width: 540px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 24px;
    width: 100%;
  }
  .header-eyebrow {
    font-size: 9px;
    letter-spacing: 7px;
    color: var(--ink3);
    margin-bottom: 2px;
  }
  .header-title {
    font-size: clamp(64px, 18vw, 104px);
    line-height: 0.85;
    color: var(--crimson);
    text-shadow: 0 4px 0 var(--cream3), 0 6px 20px rgba(155,28,28,0.2);
    letter-spacing: 4px;
  }
  .header-sub {
    font-size: 9px;
    letter-spacing: 5px;
    color: var(--ink3);
    margin-top: 8px;
    border-top: 1px solid var(--cream3);
    padding-top: 7px;
  }

  /* ── CREW SECTION ── */
  .section-label {
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--crimson);
    margin-bottom: 12px;
    text-align: center;
    width: 100%;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--cream3);
  }

  .crew-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    margin-bottom: 18px;
  }

  .crew-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform 0.15s;
  }
  .crew-btn:hover { transform: scale(1.04); }

  .crew-photo-wrap {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    border: 3px solid var(--cream3);
    transition: all 0.2s;
    position: relative;
    background: var(--cream2);
  }
  .crew-photo-wrap.selected {
    border-color: var(--crimson2);
    animation: glowRing 1.8s ease-in-out infinite;
  }
  .crew-photo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .crew-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(155,28,28,0.12) 0%, transparent 60%);
    display: none;
  }
  .crew-photo-wrap.selected .crew-overlay { display: block; }

  .crew-name {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--ink3);
    transition: color 0.15s;
    font-family: 'Bebas Neue', Impact, sans-serif;
  }
  .crew-name.selected { color: var(--crimson2); }

  /* ── BUTTON ── */
  .reveal-btn {
    width: 100%;
    padding: 18px 0;
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: clamp(14px, 3.8vw, 20px);
    letter-spacing: 3px;
    border-radius: 6px;
    border: none;
    cursor: not-allowed;
    background: var(--cream2);
    color: var(--cream3);
    transition: all 0.25s;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .reveal-btn.ready {
    background: linear-gradient(135deg, var(--crimson) 0%, var(--crimson2) 50%, var(--crimson) 100%);
    color: var(--cream);
    cursor: pointer;
    box-shadow: 0 4px 28px rgba(155,28,28,0.35), 0 1px 0 rgba(255,255,255,0.15) inset;
  }
  .reveal-btn.ready:hover {
    background: linear-gradient(135deg, var(--crimson2) 0%, var(--crimson3) 50%, var(--crimson2) 100%);
    box-shadow: 0 6px 36px rgba(155,28,28,0.45);
    transform: translateY(-1px);
  }
  .reveal-btn.spinning {
    background: var(--cream2);
    color: var(--ink3);
    cursor: wait;
  }

  /* ── SPIN DISPLAY ── */
  .spin-box {
    width: 100%;
    padding: 20px;
    text-align: center;
    background: var(--cream2);
    border: 2px solid var(--cream3);
    border-radius: 10px;
    margin-bottom: 16px;
    animation: shake 0.12s ease-in-out infinite;
  }
  .spin-label {
    font-size: 9px; letter-spacing: 6px; color: var(--ink3); margin-bottom: 8px;
  }
  .spin-emoji { font-size: 46px; }
  .spin-name { font-size: 22px; color: var(--ink); letter-spacing: 2px; margin-top: 4px; }
  .dots { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--crimson);
    animation: dots 1s ease-in-out infinite;
  }

  /* ── RESULT CARD ── */
  .result-card {
    width: 100%;
    padding: 28px 22px 22px;
    text-align: center;
    background: var(--cream);
    border: 1px solid var(--cream3);
    border-radius: 12px;
    box-shadow: 0 8px 40px var(--shadow), 0 2px 0 var(--cream3) inset;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--crimson), var(--crimson2), var(--gold), var(--crimson2), var(--crimson));
  }

  .result-eyebrow {
    font-size: 9px; letter-spacing: 7px; color: var(--ink3); margin-bottom: 16px;
  }

  .result-faces {
    display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 18px;
  }
  .result-face {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .result-face img {
    width: 74px; height: 74px; border-radius: 8px; object-fit: cover;
    border: 2px solid var(--crimson);
    box-shadow: 0 4px 16px rgba(155,28,28,0.2);
  }
  .result-face-label { font-size: 10px; letter-spacing: 1px; color: var(--crimson); }
  .result-plus {
    font-size: 24px; color: var(--cream3); font-family: 'Lora', serif;
  }
  .result-fig-box {
    width: 74px; height: 74px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px;
    background: var(--cream2);
    box-shadow: 0 4px 16px rgba(155,28,28,0.15);
  }

  .result-intro {
    font-family: 'Lora', serif;
    font-size: 12px; color: var(--ink3); letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .result-name {
    font-size: clamp(30px, 8vw, 48px);
    color: var(--ink);
    letter-spacing: 2px; line-height: 1;
    margin-bottom: 8px;
  }
  .result-badge {
    display: inline-block; padding: 3px 14px;
    border-radius: 2px; font-size: 9px; letter-spacing: 5px;
    border: 1px solid;
    margin-bottom: 20px;
  }

  /* ── STORY BOX ── */
  .story-box {
    background: var(--cream2);
    border: 1px solid var(--cream3);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: left;
    margin-bottom: 16px;
    min-height: 80px;
  }
  .story-label {
    font-size: 9px; letter-spacing: 5px; color: var(--ink3); margin-bottom: 8px;
  }
  .story-text {
    font-family: 'Lora', serif; font-style: italic;
    font-size: 13px; color: var(--ink2); line-height: 1.65;
    animation: fadeUp 0.5s ease;
  }

  .again-btn {
    padding: 9px 22px;
    background: transparent;
    border: 1px solid var(--cream3);
    color: var(--ink3); border-radius: 3px; cursor: pointer;
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 12px; letter-spacing: 4px;
    transition: all 0.15s;
  }
  .again-btn:hover {
    border-color: var(--crimson2); color: var(--crimson2);
    background: rgba(155,28,28,0.05);
  }

  /* ── CASE FILES ── */
  .case-toggle {
    background: none; border: none; color: var(--cream3);
    cursor: pointer; font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 11px; letter-spacing: 5px; padding: 4px 0; margin-bottom: 8px;
    display: block; width: 100%; text-align: left;
    transition: color 0.15s;
  }
  .case-toggle:hover { color: var(--ink3); }

  .case-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    background: var(--cream2);
    border: 1px solid var(--cream3);
    border-radius: 4px; margin-bottom: 5px;
    animation: fadeUp 0.3s ease;
  }
  .case-row img {
    width: 28px; height: 28px; border-radius: 3px;
    object-fit: cover; border: 1px solid var(--cream3);
  }
  .case-person { color: var(--crimson2); font-size: 13px; letter-spacing: 1px; }
  .case-arrow { color: var(--cream3); font-size: 10px; }
  .case-fig { font-size: 15px; }
  .case-name { color: var(--ink3); font-size: 11px; letter-spacing: 1px; }
  .case-time { margin-left: auto; color: var(--cream3); font-size: 10px; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-eyebrow">◆ CLASSIFIED INTEL ◆</div>
    <div class="header-title">WDYS!</div>
    <div class="header-sub">WHODOYOUSUCK · INTELLIGENCE BUREAU · EST. THE GROUP CHAT</div>
  </div>

  <!-- CREW -->
  <div class="section-label">TAP A PIC TO FIND OUT!</div>
  <div class="crew-grid" id="crewGrid"></div>

  <!-- BUTTON -->
  <button class="reveal-btn" id="revealBtn" disabled onclick="reveal()">SELECT SOMEONE FIRST</button>

  <!-- SPIN -->
  <div class="spin-box hidden" id="spinBox">
    <div class="spin-label">CROSS-REFERENCING DATABASE...</div>
    <div class="spin-emoji" id="spinEmoji">🔍</div>
    <div class="spin-name" id="spinName">Scanning...</div>
    <div class="dots">
      <div class="dot" style="animation-delay:0s"></div>
      <div class="dot" style="animation-delay:0.15s"></div>
      <div class="dot" style="animation-delay:0.3s"></div>
      <div class="dot" style="animation-delay:0.45s"></div>
      <div class="dot" style="animation-delay:0.6s"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-card hidden" id="resultCard">
    <div class="result-eyebrow">◆ INTEL CONFIRMED ◆</div>
    <div class="result-faces">
      <div class="result-face">
        <img id="resultPersonImg" src="" alt="" />
        <div class="result-face-label" id="resultPersonName"></div>
      </div>
      <div class="result-plus">+</div>
      <div class="result-face">
        <div class="result-fig-box" id="resultFigEmoji"></div>
        <div class="result-face-label" id="resultFigCat"></div>
      </div>
    </div>
    <div class="result-intro" id="resultIntro"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-badge" id="resultBadge"></div>
    <div class="story-box">
      <div class="story-label">◆ INTELLIGENCE REPORT</div>
      <div id="storyContent">
        <div class="dots" id="storyDots">
          <div class="dot" style="animation-delay:0s"></div>
          <div class="dot" style="animation-delay:0.15s"></div>
          <div class="dot" style="animation-delay:0.3s"></div>
          <div class="dot" style="animation-delay:0.45s"></div>
          <div class="dot" style="animation-delay:0.6s"></div>
        </div>
        <div class="story-text hidden" id="storyText"></div>
      </div>
    </div>
    <button class="again-btn" onclick="reveal()">RUN ANALYSIS AGAIN</button>
  </div>

  <!-- CASE FILES -->
  <div id="caseSection" class="hidden" style="width:100%">
    <button class="case-toggle" id="caseToggle" onclick="toggleHistory()">▶ CASE FILES (<span id="caseCount">0</span>)</button>
    <div id="caseList" class="hidden"></div>
  </div>

</div>

let selected = null;
let spinning = false;
let history = [];
let showHistory = false;

// Build crew grid
const grid = document.getElementById('crewGrid');
CREW.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'crew-btn';
  btn.innerHTML = `
    <div class="crew-photo-wrap" id="wrap-${c.id}">
      <img src="${c.img}" alt="${c.name}" />
      <div class="crew-overlay"></div>
    </div>
    <div class="crew-name" id="name-${c.id}">${c.name}</div>
  `;
  btn.onclick = () => selectCrew(c);
  grid.appendChild(btn);
});

function selectCrew(c) {
  selected = c;
  // Update UI
  CREW.forEach(x => {
    document.getElementById('wrap-' + x.id).classList.toggle('selected', x.id === c.id);
    document.getElementById('name-' + x.id).classList.toggle('selected', x.id === c.id);
  });
  const btn = document.getElementById('revealBtn');
  btn.disabled = false;
  btn.className = 'reveal-btn ready';
  btn.textContent = 'Analyze ' + c.name + "'s WDYS Data Points";
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('spinBox').classList.add('hidden');
}

function reveal() {
  if (!selected || spinning) return;
  spinning = true;
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('spinBox').classList.remove('hidden');
  const btn = document.getElementById('revealBtn');
  btn.className = 'reveal-btn spinning';
  btn.textContent = '⚙ ANALYZING DATA POINTS...';
  btn.disabled = true;

  let delay = 50;
  const tick = () => {
    const f = FIGURES[Math.floor(Math.random() * FIGURES.length)];
    document.getElementById('spinEmoji').textContent = f.emoji;
    document.getElementById('spinName').textContent = f.name;
    delay = Math.min(delay * 1.08, 440);
    if (delay < 420) {
      spinTimer = setTimeout(tick, delay);
    } else {
      const final = FIGURES[Math.floor(Math.random() * FIGURES.length)];
      showResult(final);
    }
  };
  spinTimer = setTimeout(tick, delay);
}

function showResult(fig) {
  spinning = false;
  document.getElementById('spinBox').classList.add('hidden');

  // Populate result card
  document.getElementById('resultPersonImg').src = selected.img;
  document.getElementById('resultPersonName').textContent = selected.name;
  document.getElementById('resultFigEmoji').textContent = fig.emoji;
  document.getElementById('resultFigCat').textContent = fig.cat;
  document.getElementById('resultFigEmoji').style.border = '2px solid ' + fig.color;
  document.getElementById('resultFigEmoji').style.boxShadow = '0 4px 16px ' + fig.color + '33';
  document.getElementById('resultIntro').textContent = selected.name + ' has been linked to...';
  document.getElementById('resultName').textContent = fig.name;

  const badge = document.getElementById('resultBadge');
  badge.textContent = fig.cat.toUpperCase() + ' · CLASSIFIED';
  badge.style.color = fig.color;
  badge.style.borderColor = fig.color + '66';
  badge.style.background = fig.color + '11';

  document.getElementById('resultCard').classList.remove('hidden');

  // Reset story
  document.getElementById('storyDots').classList.remove('hidden');
  document.getElementById('storyText').classList.add('hidden');

  // Update button
  const btn = document.getElementById('revealBtn');
  btn.className = 'reveal-btn ready';
  btn.textContent = 'Analyze ' + selected.name + "'s WDYS Data Points";
  btn.disabled = false;

  // Save to history
  const now = new Date();
  history.unshift({ person: selected, fig, time: now.toLocaleTimeString() });
  updateHistory();

  // Generate story
  generateStory(selected.name, fig);
}

async function generateStory(personName, fig) {
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are the narrator of a hilarious friend group inside joke. The joke is that we always ask each other "Who's d*** are you sucking?" (abbreviated as WDYS). We've been friends for years and roast each other constantly.

The data points have been analyzed and the results are in: ${personName} has been confirmed to be messing with ${fig.name} (${fig.cat}).

Write a short, funny, roast-style story (3-4 sentences max) about HOW this situation came to be and what their secret relationship looks like. Be creative, absurd, and hilarious. Keep it PG-13. Reference ${fig.name}'s most famous traits. End with "And now we finally know."

Just write the story. No labels, no intro.`
        }]
      })
    });
    const data = await response.json();
    const text = data.content?.find(b => b.type === "text")?.text || "The algorithm detected suspicious activity but the full report got redacted. Just know it ain't pretty. And now we finally know.";
    document.getElementById('storyDots').classList.add('hidden');
    const el = document.getElementById('storyText');
    el.textContent = text;
    el.classList.remove('hidden');
  } catch(e) {
    document.getElementById('storyDots').classList.add('hidden');
    const el = document.getElementById('storyText');
    el.textContent = "The algorithm detected suspicious activity but the full report got redacted. Just know it ain't pretty. And now we finally know.";
    el.classList.remove('hidden');
  }
}

function updateHistory() {
  const section = document.getElementById('caseSection');
  const count = document.getElementById('caseCount');
  section.classList.remove('hidden');
  count.textContent = history.length;
  document.getElementById('caseToggle').textContent = (showHistory ? '▼' : '▶') + ' CASE FILES (' + history.length + ')';

  const list = document.getElementById('caseList');
  list.innerHTML = '';
  history.forEach(h => {
    const row = document.createElement('div');
    row.className = 'case-row';
    row.innerHTML = `
      <img src="${h.person.img}" alt="" />
      <span class="case-person">${h.person.name}</span>
      <span class="case-arrow">→</span>
      <span class="case-fig">${h.fig.emoji}</span>
      <span class="case-name">${h.fig.name}</span>
      <span class="case-time">${h.time}</span>
    `;
    list.appendChild(row);
  });
}

function toggleHistory() {
  showHistory = !showHistory;
  document.getElementById('caseList').classList.toggle('hidden', !showHistory);
  document.getElementById('caseToggle').textContent = (showHistory ? '▼' : '▶') + ' CASE FILES (' + history.length + ')';
}
</script>
</body>
</html>
